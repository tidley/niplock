server {
    listen 80;
    listen [::]:80;
    server_name nsyte.run www.nsyte.run;

    root /var/www/nsyte.run;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|svg|ico|webp|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
